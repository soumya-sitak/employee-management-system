apiVersion: apps/v1
kind: Deployment

metadata:
  name: employee-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-backend

  template:
    metadata:
      labels:
        app: employee-backend

    spec:
      containers:
        - name: backend
          image: soumyasitak/employee-backend:v4
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: backend-config

            - secretRef:
                name: backend-secret



